<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Eventos | Mi Boda</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        .portal-body {
            background-color: #f4f6f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-y: auto !important;
        }

        .portal-header {
            background: white;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .portal-header h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: var(--primary-blue);
            margin-bottom: 10px;
        }

        .portal-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            width: 100%;
        }

        .event-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .event-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .event-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .event-card-header {
            height: 120px;
            background: var(--primary-olive-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--primary-olive);
        }

        .event-card-body {
            padding: 25px;
            flex: 1;
        }

        .event-card-body h3 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            color: var(--text-dark);
        }

        .event-meta {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .event-meta div {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .event-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .portal-btn {
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .btn-primary {
            background: var(--primary-blue);
            color: white;
        }

        .btn-outline {
            border: 1px solid var(--primary-blue);
            color: var(--primary-blue);
        }

        .btn-floating {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 65px;
            height: 65px;
            background: var(--primary-olive);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: transform 0.3s;
            z-index: 100;
        }

        .btn-floating:hover {
            transform: scale(1.1) rotate(90deg);
        }

        .empty-state {
            text-align: center;
            grid-column: 1 / -1;
            padding: 100px 0;
            color: var(--text-light);
        }

        .empty-state i {
            display: block;
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        /* Modal for creating new event */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .modal-card h2 {
            margin-bottom: 25px;
            font-family: 'Great Vibes', cursive;
            font-size: 2.5rem;
            text-align: center;
            color: var(--primary-blue);
        }
    </style>
  <script type="module" crossorigin src="./assets/portal-Dd8HZkBW.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/Firebase-C_lFSCaV.js">
  <link rel="modulepreload" crossorigin href="./assets/Store-AXFsgslV.js">
  <link rel="modulepreload" crossorigin href="./assets/Auth-BPRd6mCx.js">
  <link rel="stylesheet" crossorigin href="./assets/Firebase-CwWNX_i3.css">
</head>

<body class="portal-body">
    <header class="portal-header" style="position: relative;">
        <button onclick="handleLogout()" class="portal-btn btn-outline"
            style="position: absolute; top: 20px; right: 20px; width: auto; padding: 10px 15px;">
            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
        </button>
        <h1>Mis Eventos</h1>
        <p class="section-title">Plataforma de Invitaciones Digitales</p>
        <div class="portal-tabs" style="margin-top: 25px; display: flex; justify-content: center; gap: 15px;">
            <button id="tab-active" class="portal-btn btn-primary" style="min-width: 120px;"
                onclick="switchTab('active')">Activos</button>
            <button id="tab-archived" class="portal-btn btn-outline" style="min-width: 120px;"
                onclick="switchTab('archived')">Archivados</button>
        </div>
    </header>

    <main class="portal-container">
        <div id="event-grid" class="event-grid">
            <!-- Los eventos se cargan dinámicamente -->
            <div class="empty-state" id="loading-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Cargando tus eventos...</p>
            </div>
        </div>
    </main>

    <div class="btn-floating" onclick="openCreateModal()" title="Crear Nuevo Evento">
        <i class="fas fa-plus"></i>
    </div>

    <!-- Modal para Nuevo Evento -->
    <div class="modal-overlay" id="create-modal">
        <div class="modal-card">
            <h2>Nuevo Evento</h2>
            <form id="create-event-form">
                <div class="form-group">
                    <label>Nombre del Evento</label>
                    <input type="text" id="new-event-name" placeholder="Ej: Boda de Lucía y Marcos" required
                        class="form-input">
                </div>
                <div class="form-group">
                    <label>ID del Evento (URL)</label>
                    <input type="text" id="new-event-id" placeholder="ej: boda-lucia-2026" required class="form-input"
                        pattern="[a-z0-9\-]+" title="Solo letras minúsculas, números y guiones">
                </div>
                <div class="form-group">
                    <label>Tipo de Evento</label>
                    <select id="new-event-type" class="form-input">
                        <option value="wedding">Boda / Compromiso</option>
                        <option value="birthday">Cumpleaños / XV Años</option>
                        <option value="meeting">Reunión / Corporativo</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" class="portal-btn btn-outline" style="flex: 1;"
                        onclick="closeCreateModal()">Cancelar</button>
                    <button type="submit" class="portal-btn btn-primary" style="flex: 1;">Crear Evento</button>
                </div>
            </form>
        </div>
    </div>

</body>

</html>
