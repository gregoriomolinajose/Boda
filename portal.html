<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Eventos | Mi Boda</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="m3-theme.css">
    <style>
        .portal-header {
            padding: 64px 24px 40px;
            text-align: center;
            background: linear-gradient(180deg, var(--md-sys-color-surface-container-low) 0%, var(--md-sys-color-background) 100%);
        }

        .portal-header h1 {
            color: var(--md-sys-color-primary);
            margin-bottom: 12px;
            font-size: 3.5rem;
            font-family: var(--md-sys-typescale-display-font);
        }

        .portal-tabs {
            margin-top: 32px;
            display: flex;
            justify-content: center;
            gap: 12px;
            background: var(--md-sys-color-surface-container);
            padding: 8px;
            border-radius: var(--md-sys-shape-corner-full);
            max-width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .event-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Minimalist M3 Card */
        .event-grid .m3-card {
            border-radius: 28px;
            padding: 24px;
            border: 1px solid var(--md-sys-color-outline-variant);
            background: var(--md-sys-color-surface);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .event-grid .m3-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--md-sys-elevation-level2);
            border-color: var(--md-sys-color-primary);
        }

        .event-title-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .event-title-row i {
            font-size: 1.2rem;
            color: var(--md-sys-color-primary);
            background: var(--md-sys-color-primary-container);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .event-title-row h3 {
            font-family: var(--md-sys-typescale-display-font);
            font-size: 1.6rem;
            margin: 0;
            color: var(--md-sys-color-on-surface);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .event-meta-minimal {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            color: var(--md-sys-color-outline);
            font-family: var(--md-sys-typescale-body-font);
            font-size: 0.9rem;
        }

        .event-actions-minimal {
            display: flex;
            gap: 8px;
            margin-top: auto;
        }

        .action-btn-mini {
            flex: 1;
            height: 44px !important;
            padding: 0 16px !important;
            font-size: 0.85rem !important;
            border-radius: 12px !important;
        }

        .icon-btn-mini {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 1px solid var(--md-sys-color-outline-variant);
            color: var(--md-sys-color-outline);
            background: transparent;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            text-decoration: none;
        }

        .icon-btn-mini:hover {
            background: var(--md-sys-color-surface-container-high);
            color: var(--md-sys-color-primary);
            border-color: var(--md-sys-color-primary);
        }

        /* FAB Minimal */
        .m3-fab {
            width: 64px;
            height: 64px;
            bottom: 24px;
            right: 24px;
            border-radius: 20px;
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
        }

        .m3-fab i {
            font-size: 32px;
        }

        .empty-state {
            text-align: center;
            grid-column: 1 / -1;
            padding: 100px 24px;
            color: var(--md-sys-color-outline);
            font-family: var(--md-sys-typescale-display-font);
            font-size: 1.5rem;
        }

        .empty-state i {
            font-size: 5rem;
            margin-bottom: 24px;
            opacity: 0.3;
            color: var(--md-sys-color-primary);
        }

        /* Modal Overrides */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(25, 27, 34, 0.4);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
    </style>
</head>

<body class="m3-expressive">
    <header class="portal-header" style="position: relative;">
        <button onclick="handleLogout()" class="m3-btn m3-btn-outlined"
            style="position: absolute; top: 24px; right: 24px; height: 40px; padding: 0 16px;">
            <i class="fas fa-sign-out-alt"></i> Salir
        </button>
        <h1 class="m3-display-large">Mis Eventos</h1>
        <p class="m3-body-large" style="color: var(--md-sys-color-outline); letter-spacing: 2px;">PLATAFORMA DE
            INVITACIONES DIGITALES</p>

        <div class="portal-tabs">
            <button id="tab-active" class="m3-btn m3-btn-filled" onclick="switchTab('active')">Activos</button>
            <button id="tab-archived" class="m3-btn m3-btn-outlined" style="border: none;"
                onclick="switchTab('archived')">Archivados</button>
        </div>
    </header>

    <main class="portal-container">
        <div id="event-grid" class="event-grid">
            <!-- Los eventos se cargan dinámicamente -->
            <div class="empty-state" id="loading-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Cargando tus eventos...</p>
            </div>
        </div>
    </main>

    <div class="m3-fab" onclick="openCreateModal()" title="Crear Nuevo Evento">
        <i class="fas fa-plus"></i>
    </div>

    <!-- Modal para Nuevo Evento -->
    <div class="modal-overlay" id="create-modal">
        <div class="m3-card m3-card-elevated" style="width: 100%; max-width: 450px;">
            <h2 class="m3-headline-large"
                style="text-align: center; color: var(--md-sys-color-primary); margin-bottom: 24px;">Nuevo Evento</h2>
            <form id="create-event-form">
                <div class="m3-input-group" style="margin-bottom: 16px;">
                    <label class="m3-body-large" style="font-weight: 600;">Nombre del Evento</label>
                    <input type="text" id="new-event-name" placeholder="Ej: Boda de Lucía y Marcos" required
                        class="m3-input">
                </div>
                <div class="m3-input-group" style="margin-bottom: 16px;">
                    <label class="m3-body-large" style="font-weight: 600;">ID del Evento (URL)</label>
                    <input type="text" id="new-event-id" placeholder="ej: boda-lucia-2026" required class="m3-input"
                        pattern="[a-z0-9\-]+" title="Solo letras minúsculas, números y guiones">
                </div>
                <div class="m3-input-group" style="margin-bottom: 24px;">
                    <label class="m3-body-large" style="font-weight: 600;">Tipo de Evento</label>
                    <select id="new-event-type" class="m3-input">
                        <option value="wedding">Boda / Compromiso</option>
                        <option value="birthday">Cumpleaños / XV Años</option>
                        <option value="meeting">Reunión / Corporativo</option>
                    </select>
                </div>
                <div style="display: flex; gap: 12px; margin-top: 24px;">
                    <button type="button" class="m3-btn m3-btn-outlined" style="flex: 1;"
                        onclick="closeCreateModal()">Cancelar</button>
                    <button type="submit" class="m3-btn m3-btn-filled" style="flex: 1;">Crear Evento</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="config.js?v=2.0.5"></script>
    <div
        style="position: fixed; bottom: 10px; right: 10px; font-size: 14px; color: red; pointer-events: none; z-index: 10000; font-weight: bold; background: white; padding: 5px; border: 2px solid red;">
        VER-LINK-FIX</div>
    <script type="module">
        import { Store } from './js/core/Store.js';
        import { Auth } from './js/core/Auth.js';
        import { NotificationService } from './js/services/NotificationService.js';

        let currentUser = null;
        let allEvents = [];
        let currentTab = 'active';

        Auth.waitForAuthInit().then(() => {
            Auth.onSessionChange((user) => {
                if (!user) {
                    window.Utils.showToast('Acceso denegado: redireccionando a login.', 'error');
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else {
                    currentUser = user;
                    initPortal(user.uid);
                }
            });
        });

        // Exponer logout al scope global
        window.handleLogout = () => Auth.logout();

        async function initPortal(uid) {
            allEvents = await Store.getEvents(uid);
            renderEvents();
        }

        function renderEvents() {
            const grid = document.getElementById('event-grid');
            const filteredEvents = allEvents.filter(e => currentTab === 'active' ? !e.archived : e.archived);

            if (filteredEvents.length === 0) {
                grid.innerHTML = currentTab === 'active'
                    ? `
    <div class="empty-state">
        <i class="far fa-calendar-plus"></i>
        <p>Aún no tienes eventos activos. ¡Crea el primero!</p>
    </div>
    `
                    : `
    <div class="empty-state">
        <i class="fas fa-archive"></i>
        <p>No tienes eventos archivados.</p>
    </div>
    `;
                return;
            }

            grid.innerHTML = '';
            filteredEvents.sort((a, b) => (b.createdAt?.toDate?.() || 0) - (a.createdAt?.toDate?.() || 0));

            filteredEvents.forEach(event => {
                const card = document.createElement('div');
                card.className = 'm3-card m3-card-elevated';

                let iconClass = 'fa-rings-wedding';
                if (event.type === 'birthday') iconClass = 'fa-cake-candles';
                if (event.type === 'meeting') iconClass = 'fa-handshake';

                let actionsHtml = '';
                if (currentTab === 'active') {
                    actionsHtml = `
                    <div class="event-actions-minimal">
                        <a href="generator.html?event=${event.id}" class="m3-btn m3-btn-filled action-btn-mini" style="text-decoration: none;">Gestionar</a>
                        <a href="index.html?event=${event.id}" target="_blank" class="icon-btn-mini" title="Ver Invitación"><i class="fas fa-eye"></i></a>
                        <button onclick="handleArchive('${event.id}', true)" class="icon-btn-mini" title="Archivar"><i class="fas fa-archive"></i></button>
                    </div>
                    `;
                } else {
                    actionsHtml = `
                    <div class="event-actions-minimal">
                        <button onclick="handleArchive('${event.id}', false)" class="m3-btn m3-btn-filled action-btn-mini">Restaurar</button>
                        <button onclick="handleDelete('${event.id}')" class="icon-btn-mini" style="color: var(--md-sys-color-error); border-color: var(--md-sys-color-error);" title="Eliminar"><i class="fas fa-trash"></i></button>
                    </div>
                    `;
                }

                card.innerHTML = `
                <div class="event-title-row">
                    <i class="fas ${iconClass}"></i>
                    <h3>${event.eventName || event.id}</h3>
                </div>
                <div class="event-meta-minimal">
                    <i class="far fa-calendar-alt"></i>
                    <span>${event.wedding?.date ? new Date(event.wedding.date).toLocaleDateString() : 'Por definir'}</span>
                </div>
                ${actionsHtml}
                `;
                grid.appendChild(card);
            });
        }

        window.switchTab = (tab) => {
            currentTab = tab;
            document.getElementById('tab-active').className = tab === 'active' ? 'm3-btn m3-btn-filled' : 'm3-btn m3-btn-outlined';
            document.getElementById('tab-active').style.border = tab === 'active' ? 'none' : '';
            document.getElementById('tab-archived').className = tab === 'archived' ? 'm3-btn m3-btn-filled' : 'm3-btn m3-btn-outlined';
            document.getElementById('tab-archived').style.border = tab === 'archived' ? 'none' : '';
            renderEvents();
        };

        window.handleArchive = async (eventId, archive) => {
            if (archive && !confirm('¿Estás seguro de archivar este evento? Seguirá existiendo y podrás restaurarlo luego.'))
                return;
            try {
                await Store.archiveEvent(eventId, archive);
                const eventIndex = allEvents.findIndex(e => e.id === eventId);
                if (eventIndex !== -1) {
                    allEvents[eventIndex].archived = archive;
                }
                renderEvents();
                window.Utils.showToast(archive ? 'Evento archivado' : 'Evento restaurado', 'info');
            } catch (err) {
                window.Utils.showToast('Error al actualizar el evento.', 'error');
            }
        };

        window.handleDelete = async (eventId) => {
            if (!confirm('Peligro: Esta acción ELIMINARÁ PERMANENTEMENTE el evento y no se puede deshacer. ¿Deseas continuar?'))
                return;
            try {
                allEvents = allEvents.filter(e => e.id !== eventId);
                renderEvents();
                window.Utils.showToast('Evento eliminado', 'success');
            } catch (err) {
                window.Utils.showToast('Error al eliminar el evento.', 'error');
            }
        };

        window.openCreateModal = () => document.getElementById('create-modal').style.display = 'flex';
        window.closeCreateModal = () => document.getElementById('create-modal').style.display = 'none';

        document.getElementById('create-event-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('new-event-id').value.trim().toLowerCase();
            const name = document.getElementById('new-event-name').value.trim();
            const type = document.getElementById('new-event-type').value;

            try {
                if (!currentUser) throw new Error("No hay sesión activa.");
                await Store.createEvent(id, name, type, currentUser.uid);
                window.Utils.showToast('Evento creado exitosamente');
                setTimeout(() => location.reload(), 1500);
            } catch (err) {
                window.Utils.showToast('Error: Es posible que ese ID ya esté en uso o la sesión caducó.', 'error');
            }
        });

        // Autogenerar ID desde el nombre
        document.getElementById('new-event-name').addEventListener('input', (e) => {
            const idInput = document.getElementById('new-event-id');
            if (idInput.value === '' || idInput.dataset.auto === 'true') {
                idInput.value = e.target.value.toLowerCase()
                    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                    .replace(/[^a-z0-9]/g, '-')
                    .replace(/-+/g, '-')
                    .replace(/^-|-$/g, '');
                idInput.dataset.auto = 'true';
            }
        });

        // initPortal() eliminado, Auth.onSessionChange() inyectará el evento.
    </script>
</body>

</html>
