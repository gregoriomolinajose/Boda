<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Bellfy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="m3-theme.css">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #0a1128;
        }

        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            /* Deep Navy Expressive Background */
            background: linear-gradient(135deg, var(--md-sys-color-primary) 0%, #0a1128 100%);
            position: relative;
            overflow: hidden;
        }

        /* Ambient Orbs para un toque orgánico y elegante de M3 Expressive */
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: 0;
        }

        .orb-1 {
            width: 50vw;
            height: 50vw;
            top: -10%;
            left: -10%;
            background: var(--md-sys-color-tertiary);
        }

        .orb-2 {
            width: 60vw;
            height: 60vw;
            bottom: -20%;
            right: -10%;
            background: var(--md-sys-color-secondary);
        }

        .login-card-m3 {
            width: 100%;
            max-width: 440px;
            text-align: center;
            padding: 56px 40px;
            /* M3 Expressive Extra Large Corner Radius */
            border-radius: 48px;
            background: var(--md-sys-color-surface);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
            z-index: 1;
            position: relative;
            box-sizing: border-box;
        }

        .login-logo {
            font-family: var(--md-sys-typescale-display-font);
            font-size: 4.5rem;
            font-style: italic;
            color: var(--md-sys-color-primary);
            line-height: 1.1;
            margin-bottom: 24px;
        }

        .login-headline {
            font-family: var(--md-sys-typescale-display-font);
            font-size: 2.2rem;
            color: var(--md-sys-color-on-surface);
            margin-bottom: 16px;
            line-height: 1.2;
            font-weight: 500;
        }

        .login-body {
            font-family: var(--md-sys-typescale-body-font);
            font-size: var(--md-sys-typescale-body-large-size);
            color: var(--md-sys-color-outline);
            margin-bottom: 48px;
            line-height: 1.6;
            padding: 0 8px;
        }

        .google-btn-expressive {
            width: 100%;
            height: 64px;
            border-radius: 32px;
            /* Pill shape */
            background-color: var(--md-sys-color-surface-container-low);
            color: var(--md-sys-color-on-surface);
            border: 1px solid var(--md-sys-color-outline-variant);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            font-family: var(--md-sys-typescale-body-font);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            box-shadow: var(--md-sys-elevation-level1);
        }

        .google-btn-expressive:hover {
            background-color: white;
            transform: translateY(-2px);
            box-shadow: var(--md-sys-elevation-level3);
            border-color: var(--md-sys-color-primary);
        }

        .google-icon {
            width: 28px;
            height: 28px;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 17, 40, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--md-sys-color-secondary);
            border-radius: 50%;
            width: 56px;
            height: 56px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="m3-expressive">

    <div class="login-wrapper">
        <div class="ambient-orb orb-1"></div>
        <div class="ambient-orb orb-2"></div>

        <div class="login-card-m3">
            <div class="login-logo">Bellfy</div>

            <h1 class="login-headline">
                Crea recuerdos inolvidables
            </h1>

            <p class="login-body">
                Comienza a organizar tu evento hoy. Accede de forma segura y centralizada.
            </p>

            <button class="google-btn-expressive" onclick="handleGoogleLogin()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo"
                    class="google-icon">
                Entrar con Google
            </button>

            <p
                style="font-family: var(--md-sys-typescale-body-font); font-size: 13px; color: var(--md-sys-color-outline); margin-top: 32px; letter-spacing: 0.5px;">
                &copy; 2026 Bellfy Invitaciones
            </p>
        </div>
    </div>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <p class="m3-body-large" style="margin-top: 24px; color: var(--md-sys-color-primary); font-weight: 600;">
            Verificando credenciales...</p>
    </div>

    <!-- App Logic -->
    <script type="module" src="js/core/Firebase.js?v=2.0.4"></script>
    <script type="module" src="js/core/Auth.js?v=2.0.4"></script>
    <script type="module" src="js/controllers/LoginController.js?v=2.0.4"></script>
    <div
        style="position: fixed; bottom: 10px; right: 10px; font-size: 14px; color: red; pointer-events: none; z-index: 10000; font-weight: bold; background: rgba(255,255,255,0.8); padding: 5px; border: 2px solid red;">
        VER-CAL-FIX</div>
</body>

</html>
